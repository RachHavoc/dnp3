  - d1a2b3c4-e5f6-7890-abcd-ef1234567804   # DNP3 (TCP) - Read Analog Inputs (Group 30)
  - d1a2b3c4-e5f6-7890-abcd-ef1234567805   # DNP3 (TCP) - Read Binary Inputs (Group 1)
  - d1a2b3c4-e5f6-7890-abcd-ef1234567807   # DNP3 (TCP) - Read Binary Output Status (Group 10)
  - d1a2b3c4-e5f6-7890-abcd-ef1234567806   # DNP3 (TCP) - Read Class 1 Event Data (Group 60 Var 2)
