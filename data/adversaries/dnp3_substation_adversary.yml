id: 7a4e2f8c-b3d1-4e9a-8c5f-2b0d7e3a9f1c
name: DNP3 Substation Threat Actor
description: >
  Adversary profile emulating TTPs against internet-exposed DNP3 outstations
  in electric utility substation environments, based on CISA April 2026 advisory
  (co-issued with FBI, NSA, EPA, DOE, USCYBERCOM). Maps to MITRE ATT&CK for ICS.

  Kill chain phases:
    1. Reconnaissance       - port scan, device enumeration
    2. Collection           - integrity poll, analog/binary reads, event data
    3. Inhibit Response     - disable unsolicited responses (blinds the SCADA master station)
    4. Impair Process Ctrl  - direct operate binary/analog outputs
    5. Impact               - cold restart

