- id: f3a1c9e7-2b4d-4081-8e5a-6c3f2d9b7e02
  name: RTAC HMI - Download Project
  description: >
    Retrieves a named HMI project from the SEL RTAC as an .hprjson file via
    GET /api/v1/hmi/projects/{HMIProjectName}. Captures the full HMI
    configuration — display screens, tag bindings, and control logic — for
    off-device analysis or modification before re-upload.
  tactic: collection
  technique_id: T0802
  technique_name: Automated Collection
  executors:
  - platform: linux
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: psh
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  repeatable: false
  plugin: dnp3
