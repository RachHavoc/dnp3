- id: d1a2b3c4-e5f6-7890-abcd-ef1234567804
  name: DNP3 (TCP) - Read Analog Inputs
  description: >
    Issues a DNP3 Read for Analog Input objects (Object Group 30) to retrieve
    current measured values such as voltage, current, power, frequency, and
    temperature from substation IEDs. Establishes baseline process state and
    identifies high-value setpoint targets before manipulation.
  tactic: collection
  technique_id: T0802
  technique_name: Automated Collection
  executors:
  - platform: linux
    name: sh
    command: >
      ./dnp3-actions tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 30
    payloads:
    - dnp3-actions
    timeout: 60
  - platform: windows
    name: psh
    command: >
      .\dnp3-actions.exe tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 30
    payloads:
    - dnp3-actions.exe
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      .\dnp3-actions.exe tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 30
    payloads:
    - dnp3-actions.exe
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      ./dnp3-actions_darwin tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 30
    payloads:
    - dnp3-actions_darwin
    timeout: 60
  repeatable: false
  plugin: dnp3
