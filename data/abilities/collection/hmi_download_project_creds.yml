- id: f3a1c9e7-2b4d-4081-8e5a-6c3f2d9b7e06
  name: RTAC HMI - Download Project (Credentials)
  description: >
    Retrieves a named HMI project from the SEL RTAC as an .hprjson file via
    GET /api/v1/hmi/projects/{HMIProjectName} using captured Basic auth
    credentials. Captures the full HMI configuration for off-device analysis
    or modification before re-upload. Emulates an attacker using harvested
    username/password to exfiltrate relay configuration data.
  tactic: collection
  technique_id: T0802
  technique_name: Automated Collection
  executors:
  - platform: linux
    name: sh
    command: >
      ./rtac_hmi --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      ./rtac_hmi_darwin --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi_darwin
    timeout: 60
  - platform: windows
    name: psh
    command: >
      .\rtac_hmi.exe --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.exe
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      .\rtac_hmi.exe --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure download-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.exe
    timeout: 60
  repeatable: false
  plugin: dnp3
