- id: a1b2c3d4-e5f6-7890-abcd-ef0987654321
  name: DNP3 Outstation Simulator (Target Setup)
  description: >
    Deploys and starts the DNP3 outstation simulator on the target agent,
    making it reachable for all attacker-side DNP3 abilities. Listens on
    all interfaces (0.0.0.0). Run this on the target agent before executing
    the adversary chain on the attacker agent. Cleanup kills the process.
  tactic: setup
  technique_id: T0000
  technique_name: Target Environment Setup
  executors:
  - platform: linux
    name: sh
    command: |
      ./dnp3-outstation --ip 0.0.0.0 --port #{dnp3.server.port} --local #{dnp3.local.link} --remote #{dnp3.remote.link} &
      echo $! > /tmp/dnp3_outstation.pid
      sleep 2
      echo "DNP3 outstation PID $(cat /tmp/dnp3_outstation.pid) listening on 0.0.0.0:#{dnp3.server.port}"
    cleanup: |
      kill $(cat /tmp/dnp3_outstation.pid) 2>/dev/null
      rm -f /tmp/dnp3_outstation.pid
    payloads:
    - dnp3-outstation
    timeout: 15
  - platform: darwin
    name: sh
    command: |
      ./dnp3-outstation_darwin --ip 0.0.0.0 --port #{dnp3.server.port} --local #{dnp3.local.link} --remote #{dnp3.remote.link} &
      echo $! > /tmp/dnp3_outstation.pid
      sleep 2
      echo "DNP3 outstation PID $(cat /tmp/dnp3_outstation.pid) listening on 0.0.0.0:#{dnp3.server.port}"
    cleanup: |
      kill $(cat /tmp/dnp3_outstation.pid) 2>/dev/null
      rm -f /tmp/dnp3_outstation.pid
    payloads:
    - dnp3-outstation_darwin
    timeout: 15
  repeatable: false
  plugin: dnp3
