- id: d1a2b3c4-e5f6-7890-abcd-ef1234567802
  name: DNP3 (TCP) - Device Attribute Enumeration
  description: >
    Issues a DNP3 Read for Device Attributes (Object Group 0, Variation 252)
    to retrieve vendor name, device type, firmware revision, and serial number.
    Enables fingerprinting of the vendor family (Rockwell, Siemens, SEL, GE,
    etc.) for targeted follow-on exploitation.
  tactic: discovery
  technique_id: T0888
  technique_name: Remote System Information Discovery
  executors:
  - platform: linux
    name: sh
    command: >
      ./dnp3-actions tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 0 --variation 252
    payloads:
    - dnp3-actions
    timeout: 60
  - platform: windows
    name: psh
    command: >
      .\dnp3-actions.exe tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 0 --variation 252
    payloads:
    - dnp3-actions.exe
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      .\dnp3-actions.exe tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 0 --variation 252
    payloads:
    - dnp3-actions.exe
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      ./dnp3-actions_darwin tcp #{dnp3.server.ip} #{dnp3.local.link} #{dnp3.remote.link}
      -p #{dnp3.server.port} read 0 --variation 252
    payloads:
    - dnp3-actions_darwin
    timeout: 60
  repeatable: false
  plugin: dnp3
