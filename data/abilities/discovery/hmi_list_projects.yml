- id: f3a1c9e7-2b4d-4081-8e5a-6c3f2d9b7e01
  name: RTAC HMI - List Projects
  description: >
    Queries the SEL RTAC HMI REST API (GET /api/v1/hmi/projects) to enumerate
    all HMI projects deployed on the target RTAC. Identifies project names,
    versions, and structure to inform follow-on collection or manipulation.
  tactic: discovery
  technique_id: T0888
  technique_name: Remote System Information Discovery
  executors:
  - platform: linux
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure list-projects
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: darwin
    name: sh
    command: >
      python3 ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure list-projects
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: psh
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure list-projects
    payloads:
    - rtac_hmi.py
    timeout: 60
  - platform: windows
    name: cmd
    command: >
      python ./rtac_hmi.py --base-url #{rtac.hmi.base_url}
      --token #{rtac.hmi.token} --insecure list-projects
    payloads:
    - rtac_hmi.py
    timeout: 60
  repeatable: true
  plugin: dnp3
